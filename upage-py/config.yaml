server:
  host: "0.0.0.0"
  port: 50051
  rest_port: 8000

llm:
  provider: "openai"
  model: "gpt-4"
  temperature: 0.7
  max_tokens: 1024

tts:
  engine: "edge-tts"
  voice: "zh-CN-XiaoxiaoNeural"
  speed: 1.0

