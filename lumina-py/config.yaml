server:
  host: "0.0.0.0"
  port: 50051
  rest_port: 8000

hot_reload: false

# Mock mode: set to true to run without any real AI services
# Perfect for first-time users and frontend development
mock:
  enabled: false
  # Simulated latency in seconds (0 = instant)
  latency: 0.3
  # When true, the server auto-detects available services and falls back to mock
  auto_fallback: true

llm:
  provider: "openai"
  model: "gpt-4"
  temperature: 0.7
  max_tokens: 1024

tts:
  engine: "edge-tts"
  voice: "zh-CN-XiaoxiaoNeural"
  speed: 1.0
  pitch: 0.0
  volume: 1.0
  language: "zh-CN"
  cache_enabled: true
  cache_dir: "cache/tts"
  cache_ttl: 3600

stt:
  engine: "whisper"
  model: "base"
  language: "zh"
  sample_rate: 16000
  vad_enabled: true
  device: "auto"
  compute_type: "float16"
  vosk_model_path: "models/vosk"

lip_sync:
  fps: 30
  emotion: "neutral"
  emotion_intensity: 0.5
  smoothing: 0.3

crew:
  max_iterations: 5
  verbose: true

neuro:
  stream_mode: "simulate"
  audience_size: 10
  auto_reply: true
  # Proactive behavior: emit spontaneous actions/comments every N seconds
  proactive_interval: 30

chat:
  session_timeout: 300
  max_sessions: 1000
  decay_rate: 0.1
  blend_threshold: 0.3

persona:
  # Current VTuber persona (set to 'nekoclaw' for cat-girl mode)
  name: "nekoclaw"

monitoring:
  # /metrics endpoint available when enabled
  enabled: true
  port: 9090

logging:
  level: "INFO"
  file: "logs/lumina.log"
