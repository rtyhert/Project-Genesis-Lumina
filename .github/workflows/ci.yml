name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python-lint-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: lumina-py

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: lumina-py/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 src/ --max-line-length=120 --count

      - name: Test with pytest
        run: |
          python -m pytest tests/ -v --tb=short -q

  cpp-core-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++

      - name: Build core tests
        working-directory: lumina-cpp
        run: |
          cmake -B build-test -S tests -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-test --target lumina_core_test -j$(nproc)

      - name: Run core tests
        working-directory: lumina-cpp
        run: |
          ctest --test-dir build-test --output-on-failure
