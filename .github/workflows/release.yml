name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # 1. Build & test (same as CI)
  # ──────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ──────────────────────────────────────────────
  # 2. Create GitHub Release
  # ──────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          echo "## What's Changed" > _release.md
          git log --oneline --no-decorate ${RANGE} | \
            sed 's/^/- /' >> _release.md
          echo "" >> _release.md
          echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" >> _release.md

      - name: Build Python package
        run: |
          pip install build
          cd lumina-py && python -m build --outdir ../dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Lumina ${{ github.ref_name }}
          body_path: _release.md
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
